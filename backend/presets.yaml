presets:
  - id: formal_email
    label: "Formal Email"
    prompt: |
      Rewrite the following transcript as a polished, professional formal email.
      Correct grammar and punctuation. Output only the email body, no subject line.

  - id: short_reply
    label: "Short Reply"
    prompt: |
      Condense the following transcript into a brief, direct reply of 1-3 sentences.
      Keep the core message but remove filler words and hesitations.

  - id: bullet_points
    label: "Bullet Points"
    prompt: |
      Convert the following transcript into a clear bullet-point list.
      Each bullet should be one concise idea. Use plain dashes as bullets.

  - id: casual_message
    label: "Casual Message"
    prompt: |
      Rewrite the following transcript as a friendly, casual message suitable
      for a colleague or friend. Keep it natural and conversational.

  - id: clean_transcript
    label: "Clean Up"
    prompt: |
      Clean up the following transcript: fix grammar, remove filler words (um, uh, like),
      fix punctuation, and correct any obvious transcription errors.
      Keep the original meaning and tone intact.
